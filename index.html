<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MEEG Productivity</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-from:#c8d8f0;--bg-to:#e8f0fa;
  --bg:#dce8f5;--card:rgba(255,255,255,0.55);--elevated:rgba(255,255,255,0.35);
  --border:rgba(255,255,255,0.6);--border-light:rgba(255,255,255,0.4);
  --glass:rgba(255,255,255,0.45);--glass-hover:rgba(255,255,255,0.65);
  --primary:#1a3a6b;--primary-light:rgba(26,58,107,0.12);
  --accent:#e8a000;--accent-light:rgba(232,160,0,0.18);
  --success:#16a34a;--warning:#f59e0b;--danger:#dc2626;--info:#2563eb;
  --text:#0f1e2e;--text-soft:#2a3a4a;--muted:#5a6a7a;
  --font:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
  --radius:12px;--radius-lg:16px;
  --shadow:0 4px 24px rgba(26,58,107,0.12);--shadow-hover:0 8px 32px rgba(26,58,107,0.20);
  --blur:blur(20px);
}
html[data-theme="dark"]{
  --bg-from:#060e1c;--bg-to:#0c1830;
  --bg:#08111f;
  --card:rgba(255,255,255,0.07);--elevated:rgba(255,255,255,0.05);
  --border:rgba(255,255,255,0.13);--border-light:rgba(255,255,255,0.07);
  --glass:rgba(255,255,255,0.07);--glass-hover:rgba(255,255,255,0.12);
  --primary-light:rgba(140,180,255,0.12);--accent-light:rgba(232,160,0,0.15);
  --text:#ddeeff;--text-soft:#8aaabb;--muted:#506070;
  --shadow:0 4px 24px rgba(0,0,0,0.5);--shadow-hover:0 8px 40px rgba(0,0,0,0.7);
}
html,body{height:100%}
body{background:linear-gradient(135deg,var(--bg-from) 0%,var(--bg-to) 100%);background-attachment:fixed;color:var(--text);font-family:var(--font);overflow-x:hidden;min-height:100vh;transition:background .5s,color .3s;}
body::before,body::after{content:'';position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(80px);transition:opacity .5s;}
body::before{width:700px;height:700px;background:radial-gradient(circle,rgba(74,143,212,.5) 0%,transparent 70%);top:-200px;left:-200px;opacity:.4;}
body::after{width:600px;height:600px;background:radial-gradient(circle,rgba(232,160,0,.4) 0%,transparent 70%);bottom:-150px;right:-150px;opacity:.35;}
html[data-theme="dark"] body::before{background:radial-gradient(circle,rgba(20,60,140,.8) 0%,transparent 70%);opacity:.5;}
html[data-theme="dark"] body::after{background:radial-gradient(circle,rgba(140,80,0,.6) 0%,transparent 70%);opacity:.4;}

/* ── SPLASH SCREEN ──────────────────────────────────── */
#splash{
  position:fixed;inset:0;z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;
  background:linear-gradient(135deg,#050d1a 0%,#0a1830 50%,#050d1a 100%);
  transition:opacity .6s ease,transform .6s ease;
}
#splash.fade-out{opacity:0;transform:scale(1.04);pointer-events:none;}
.splash-logo{display:flex;flex-direction:column;align-items:center;gap:16px;}
.splash-svg{animation:splashDrop .7s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes splashDrop{from{opacity:0;transform:translateY(-30px) scale(.8)}to{opacity:1;transform:translateY(0) scale(1)}}
.splash-brand{font-size:2.2rem;font-weight:800;letter-spacing:2px;color:#fff;
  animation:splashFade .6s ease .3s both;
  background:linear-gradient(135deg,#fff 40%,rgba(232,160,0,.9));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.splash-sub{font-size:.7rem;color:rgba(255,255,255,.4);letter-spacing:3px;text-transform:uppercase;animation:splashFade .6s ease .5s both;}
@keyframes splashFade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.splash-bar-wrap{width:180px;height:2px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;animation:splashFade .4s ease .7s both;}
.splash-bar{height:100%;background:linear-gradient(90deg,#e8a000,#ffcc44);border-radius:2px;animation:splashLoad 1.8s ease .8s both;}
@keyframes splashLoad{from{width:0%}to{width:100%}}
.splash-dots{display:flex;gap:6px;animation:splashFade .4s ease .9s both;}
.splash-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.3);}
.splash-dot:nth-child(1){animation:dotPulse 1.2s ease .9s infinite;}
.splash-dot:nth-child(2){animation:dotPulse 1.2s ease 1.1s infinite;}
.splash-dot:nth-child(3){animation:dotPulse 1.2s ease 1.3s infinite;}
@keyframes dotPulse{0%,100%{background:rgba(255,255,255,.2);transform:scale(1)}50%{background:rgba(232,160,0,.9);transform:scale(1.4)}}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.2);border-radius:3px}
::-webkit-scrollbar-track{background:transparent}

.dm-toggle{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:#fff;font-size:.62rem;font-weight:600;font-family:var(--font);cursor:pointer;transition:all .25s;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
.dm-toggle:hover{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.35);}
.dm-icon{font-size:.85rem;transition:transform .5s;}
html[data-theme="dark"] .dm-icon{transform:rotate(360deg);}

.hdr{background:rgba(8,18,38,0.78);border-bottom:1px solid rgba(255,255,255,.1);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 4px 30px rgba(0,0,0,.25);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);}
.hdr-left{display:flex;align-items:center;gap:12px}
.meeg-logo{display:flex;align-items:center;gap:8px}
.meeg-wordmark .brand{font-size:1.1rem;font-weight:800;letter-spacing:.5px;color:#fff}
.meeg-wordmark .sub{font-size:.5rem;color:rgba(255,255,255,.45);letter-spacing:1.2px;text-transform:uppercase;margin-top:1px}
.hdr-title{border-left:1px solid rgba(255,255,255,.18);padding-left:12px}
.hdr-title h1{font-size:.82rem;font-weight:700;color:#fff}
.hdr-title h1 span{color:var(--accent);font-weight:800}
.hdr-title p{font-size:.52rem;color:rgba(255,255,255,.4);margin-top:1px;letter-spacing:.3px}
.bdg{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:12px;font-size:.52rem;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.bdg-info{background:rgba(232,160,0,.15);color:var(--accent);border:1px solid rgba(232,160,0,.3)}
.bdg-live{background:rgba(22,163,74,.15);color:#4ade80;border:1px solid rgba(22,163,74,.3)}
.bdg-live::before{content:'';width:5px;height:5px;background:#16a34a;border-radius:50%;animation:pulse 2s ease-in-out infinite}
.bdg-rows{background:rgba(245,158,11,.12);color:var(--warning);border:1px solid rgba(245,158,11,.25)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.hdr-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.meta-blk{text-align:right;font-size:.52rem}
.meta-blk span{color:rgba(255,255,255,.3);display:block;letter-spacing:.3px}
.meta-blk strong{color:rgba(255,255,255,.75);font-size:.6rem;font-weight:600}
.btn{padding:5px 12px;border-radius:var(--radius);border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.1);color:#fff;font-size:.6rem;font-weight:600;font-family:var(--font);cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:4px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
.btn:hover{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.3);}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn-c{background:linear-gradient(135deg,var(--accent),#ffcc44);border-color:var(--accent);color:#1a1000;font-weight:700;}
.btn-c:hover{background:linear-gradient(135deg,#ffcc44,var(--accent));transform:translateY(-1px);}
.btn-d{background:rgba(220,38,38,.15);border-color:rgba(220,38,38,.3);color:#fca5a5}
.btn-d:hover{background:rgba(220,38,38,.25);}

.sync-bar{height:2px;background:rgba(255,255,255,.08);overflow:hidden;position:relative;z-index:99;}
.sync-progress{height:100%;background:linear-gradient(90deg,var(--accent),#ffcc44);width:0%;border-radius:1px}
.sync-bar.active .sync-progress{animation:syncpulse 1.5s ease-in-out infinite}
@keyframes syncpulse{0%{width:0%;margin-left:0}50%{width:40%;margin-left:30%}100%{width:0%;margin-left:100%}}

.shift-banner{background:var(--glass);border-bottom:1px solid var(--border);padding:6px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);position:relative;z-index:1;}
.shift-banner-label{font-size:.55rem;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:600;white-space:nowrap}
.opt-shifts-wrap{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.opt-shift-btn{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:.58rem;font-weight:600;font-family:var(--font);cursor:pointer;transition:all .2s;border:1.5px dashed var(--border);background:rgba(255,255,255,.06);color:var(--muted);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
.opt-shift-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
.opt-shift-btn.on{border-style:solid;border-color:var(--accent);background:var(--accent-light);color:#7a4000}
html[data-theme="dark"] .opt-shift-btn.on{color:#ffcc44;}
.opt-shift-btn .dot{font-size:.5rem}

.fstrip{padding:10px 20px;background:var(--glass);border-bottom:1px solid var(--border);box-shadow:var(--shadow);display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:50px;z-index:90;backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);}
.fg{position:relative}
.fchip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;border:1.5px solid var(--border);background:rgba(255,255,255,.15);color:var(--text-soft);font-size:.65rem;font-weight:600;font-family:var(--font);cursor:pointer;transition:all .2s;white-space:nowrap;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
.fchip:hover,.fchip.has-sel{border-color:var(--primary);color:var(--primary);background:var(--primary-light);}
html[data-theme="dark"] .fchip:hover,html[data-theme="dark"] .fchip.has-sel{color:#88bbff;border-color:rgba(140,180,255,.5);background:rgba(140,180,255,.1);}
.chk-cnt{background:var(--primary);color:#fff;border-radius:20px;padding:1px 5px;font-size:.55rem;font-weight:700}
html[data-theme="dark"] .chk-cnt{background:rgba(140,180,255,.2);color:#88bbff;}
.chk-arr{font-size:.5rem;opacity:.5;transition:transform .2s}
.fchip.open .chk-arr{transform:rotate(180deg)}
.dpanel{position:absolute;top:calc(100% + 6px);left:0;z-index:200;background:rgba(240,248,255,.92);border:1.5px solid rgba(200,220,255,.8);border-radius:var(--radius);min-width:200px;max-width:260px;box-shadow:var(--shadow-hover);display:none;overflow:hidden;backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);}
html[data-theme="dark"] .dpanel{background:rgba(10,20,45,.92);border-color:rgba(140,180,255,.15);}
.dpanel.open{display:block;animation:dropin .15s ease-out}
@keyframes dropin{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.dp-srch{width:100%;padding:7px 10px;background:rgba(255,255,255,.35);border:none;border-bottom:1px solid var(--border);color:var(--text);font-size:.68rem;font-family:var(--font);outline:none}
html[data-theme="dark"] .dp-srch{background:rgba(255,255,255,.05);color:#ddeeff;}
.dp-list{max-height:200px;overflow-y:auto;padding:3px}
.dp-item{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:4px;cursor:pointer;font-size:.68rem;transition:background .1s;color:var(--text);}
.dp-item:hover{background:rgba(26,58,107,.08);}
html[data-theme="dark"] .dp-item:hover{background:rgba(140,180,255,.1);}
.dp-item.on{background:var(--accent-light);color:#7a4000}
html[data-theme="dark"] .dp-item.on{color:#ffcc44;background:rgba(232,160,0,.15);}
.dp-cb{width:12px;height:12px;border:1.5px solid var(--border);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.55rem;transition:all .12s}
.dp-item.on .dp-cb{background:var(--accent);border-color:var(--accent);color:#fff}
.dp-cnt{margin-left:auto;font-size:.55rem;color:var(--muted);font-family:var(--mono)}
.dp-foot{padding:5px 8px;border-top:1px solid var(--border);display:flex;gap:4px}
.dp-foot button{flex:1;padding:3px;border-radius:4px;font-size:.58rem;font-weight:600;font-family:var(--font);cursor:pointer;border:1px solid var(--border);background:rgba(255,255,255,.15);color:var(--muted);transition:all .15s}
.dp-foot button:hover{border-color:var(--primary);color:var(--primary)}
html[data-theme="dark"] .dp-foot button:hover{color:#88bbff;border-color:rgba(140,180,255,.4);}
.fsep{width:1px;height:20px;background:var(--border);margin:0 2px}

.pills-row{padding:6px 20px;display:flex;align-items:center;gap:4px;flex-wrap:wrap;min-height:32px;background:rgba(255,255,255,.12);border-bottom:1px solid var(--border);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
.pill{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:12px;font-size:.6rem;font-weight:600;border:1.5px solid rgba(232,160,0,.5);background:rgba(232,160,0,.12);color:#7a4000}
html[data-theme="dark"] .pill{color:#ffcc44;background:rgba(232,160,0,.12);}
.pill-x{cursor:pointer;opacity:.5;font-size:.6rem;transition:opacity .15s}
.pill-x:hover{opacity:1}
.pill-all{border-color:var(--border);background:transparent;color:var(--muted)}
.clr-btn{padding:2px 8px;border-radius:12px;border:1.5px solid rgba(220,38,38,.3);background:rgba(220,38,38,.08);color:#dc2626;font-size:.58rem;font-weight:600;cursor:pointer;transition:all .15s}
.clr-btn:hover{background:rgba(220,38,38,.18)}

.loc-tabs{display:flex;gap:4px;flex-wrap:wrap;padding:12px 20px 0;border-bottom:1px solid var(--border);background:rgba(255,255,255,.1);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
.loc-tab{padding:7px 14px;border-radius:8px 8px 0 0;font-size:.68rem;font-weight:600;cursor:pointer;border:1.5px solid var(--border);border-bottom:none;background:rgba(255,255,255,.15);color:var(--text-soft);transition:all .2s;position:relative;bottom:-1px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
.loc-tab:hover{border-color:rgba(26,58,107,.4);color:var(--primary);background:rgba(255,255,255,.3);}
html[data-theme="dark"] .loc-tab:hover{color:#88bbff;border-color:rgba(140,180,255,.3);}
.loc-tab.act{background:rgba(255,255,255,.65);border-color:rgba(255,255,255,.8);border-bottom:1px solid rgba(255,255,255,.65);color:var(--primary);box-shadow:0 -2px 14px rgba(26,58,107,.12);}
html[data-theme="dark"] .loc-tab.act{background:rgba(140,180,255,.1);border-color:rgba(140,180,255,.25);color:#88bbff;}
.loc-tab .tab-cnt{margin-left:4px;background:var(--primary-light);color:var(--primary);border-radius:20px;padding:1px 6px;font-size:.55rem;font-weight:700}
html[data-theme="dark"] .loc-tab .tab-cnt{background:rgba(140,180,255,.12);color:#88bbff;}
.loc-tab.act .tab-cnt{background:var(--primary);color:#fff}
html[data-theme="dark"] .loc-tab.act .tab-cnt{background:rgba(140,180,255,.25);color:#88bbff;}
.loc-all-tab{background:rgba(37,99,235,.07);border-color:rgba(37,99,235,.2);color:var(--info)}
.loc-all-tab.act{border-color:rgba(37,99,235,.4);color:var(--info);}
.loc-all-tab .tab-cnt{background:rgba(37,99,235,.12);color:var(--info)}
.loc-all-tab.act .tab-cnt{background:var(--info);color:#fff}
.loc-section{display:none}
.loc-section.visible{display:flex;flex-direction:column;gap:12px;animation:kiIn .3s ease-out}
@keyframes kiIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.content{padding:16px 20px;display:flex;flex-direction:column;gap:16px;position:relative;z-index:1;}
.sec{background:var(--glass);border:1.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);transition:box-shadow .25s,transform .25s;}
.sec:hover{box-shadow:var(--shadow-hover);}
.sec-hd{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.12);}
html[data-theme="dark"] .sec-hd{background:rgba(255,255,255,.04);}
.sec-t{font-size:.72rem;font-weight:700;display:flex;align-items:center;gap:6px;color:var(--text)}
.sec-m{font-size:.6rem;color:var(--muted);font-weight:500}
.loc-hdr{background:var(--glass);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);}
.loc-hdr-name{font-size:1rem;font-weight:800;letter-spacing:.3px;color:var(--primary)}
html[data-theme="dark"] .loc-hdr-name{color:#88bbff;}
.loc-stats{display:flex;gap:14px;flex-wrap:wrap}
.loc-stat{text-align:center;min-width:60px}
.loc-stat .sv{font-size:1.2rem;font-weight:800;color:var(--accent)}
.loc-stat .sl{font-size:.55rem;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-top:2px;font-weight:600}

/* MODALITY FILTER CHIPS inside person tables */
.mod-filter-bar{display:flex;align-items:center;gap:6px;padding:8px 14px;border-bottom:1px solid var(--border);flex-wrap:wrap;background:rgba(255,255,255,.06);}
.mod-filter-label{font-size:.55rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600;white-space:nowrap;}
.mod-chip{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:12px;font-size:.6rem;font-weight:600;border:1.5px solid var(--border);background:rgba(255,255,255,.1);color:var(--muted);cursor:pointer;transition:all .15s;}
.mod-chip:hover{border-color:var(--accent);color:var(--accent);}
.mod-chip.on{border-color:currentColor;background:rgba(255,255,255,.12);font-weight:700;}
.mod-chip-all{border-color:rgba(37,99,235,.3);color:var(--info);background:rgba(37,99,235,.08);}
.mod-chip-all.on{background:rgba(37,99,235,.15);}

.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;padding:12px;background:transparent}
.dcard{background:var(--glass);border:1.5px solid var(--border);border-radius:var(--radius);padding:12px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
.dcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--border);transition:background .2s}
.dcard:hover{border-color:rgba(255,255,255,.7);transform:translateY(-2px);box-shadow:var(--shadow-hover);background:var(--glass-hover);}
.dcard:hover::before,.dcard.sel::before{background:var(--accent)}
.dcard.sel{border-color:rgba(232,160,0,.5);box-shadow:0 0 0 2px rgba(232,160,0,.15)}
.dc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.dc-pc{font-size:.8rem;font-weight:800;color:var(--primary)}
html[data-theme="dark"] .dc-pc{color:#88bbff;}
.dc-cnt{background:var(--accent);color:#fff;font-size:.58rem;font-weight:700;padding:2px 7px;border-radius:12px}
.dc-meta{font-size:.62rem;color:var(--text-soft);margin-bottom:2px;display:flex;align-items:center;gap:4px;overflow:hidden}
.dc-mi{opacity:.5;font-size:.6rem;flex-shrink:0}
.dc-mt{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dc-qs{display:flex;flex-wrap:wrap;gap:3px;margin-top:6px}
.qtag{font-size:.55rem;font-weight:600;padding:2px 5px;border-radius:3px;background:rgba(37,99,235,.1);color:var(--info);border:1px solid rgba(37,99,235,.2)}
.ttbar{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:rgba(255,255,255,.08);}

.pg-btn:hover{border-color:var(--primary);color:var(--primary);background:rgba(255,255,255,.3);}
html[data-theme="dark"] .pg-btn:hover{color:#88bbff;border-color:rgba(140,180,255,.4);}
.pg-btn.act{background:var(--primary-light);border-color:var(--primary);color:var(--primary)}

.spin{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.ltxt{font-size:.62rem;color:var(--muted);letter-spacing:.4px}

.toast{position:fixed;bottom:20px;right:20px;background:rgba(8,18,40,.92);color:#fff;padding:8px 14px;border-radius:var(--radius);font-size:.68rem;font-weight:600;box-shadow:var(--shadow-hover);display:flex;align-items:center;gap:6px;z-index:9999;animation:toastin .3s ease-out;border-left:3px solid var(--accent);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);}
@keyframes toastin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

<script>
// ── SPLASH ────────────────────────────────────────────
function hideSplash() {
  const s = document.getElementById('splash');
  if (s) {
    setTimeout(() => {
      s.classList.add('fade-out');
      setTimeout(() => s.remove(), 650);
    }, 2200);
  }
}

// ── DARK MODE ─────────────────────────────────────────
function toggleDark() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  const newTheme = isDark ? 'light' : 'dark';
  html.setAttribute('data-theme', newTheme);
  document.getElementById('dmIcon').textContent = isDark ? '🌙' : '☀️';
  document.getElementById('dmLabel').textContent = isDark ? 'Dark' : 'Light';
  localStorage.setItem('meeg_theme', newTheme);
}

// ── FILTER PERSISTENCE ────────────────────────────────
function saveFilters() {
  try {
    const state = {
      sel: Object.fromEntries(Object.entries(sel).map(([k,v]) => [k, [...v]])),
      selD: [...selD], selWeeks: [...selWeeks],
      shifts: Object.fromEntries(Object.entries(shiftState).map(([k,v]) => [k, v.on])),
      activeLoc
    };
    localStorage.setItem('meeg_filters', JSON.stringify(state));
  } catch(e) {}
}
function restoreFilters() {
  try {
    const raw = localStorage.getItem('meeg_filters');
    if (!raw) return;
    const state = JSON.parse(raw);
    if (state.sel) Object.entries(state.sel).forEach(([k,arr]) => { sel[k] = new Set(arr); });
    if (state.selD) state.selD.forEach(d => selD.add(d));
    if (state.selWeeks) state.selWeeks.forEach(w => selWeeks.add(w));
    if (state.shifts) Object.entries(state.shifts).forEach(([k,on]) => {
      if (shiftState[k]) {
        shiftState[k].on = on;
        const btn = document.getElementById('btn_' + k);
        if (btn) { btn.classList.toggle('on', on); btn.querySelector('.dot').textContent = on ? '●' : '○'; }
      }
    });
    if (state.activeLoc) activeLoc = state.activeLoc;
  } catch(e) {}
}

// ── STATE ─────────────────────────────────────────────
const SHEET_ID   = '1g9mPKQMactJKC-BP0Ik3Cw72PLUXCb4VTKFbHYLjc5I';
const SHEET_NAME = 'Data Base';
const REFRESH_INTERVAL = 60;
const ALL_SHIFTS = ["over night","over night 12 h","morning 12 h","night","morning","over shift (m)","over shift (n)","over shift (on)"];
const PGSZ = 75;
const SC = [
  {key:'Qtc Name',lbl:'QTC',ic:'🏷️'},{key:'Yubikey Email',lbl:'Email',ic:'✉️'},
  {key:'Labeler Name',lbl:'Labeler',ic:'👤'},{key:'Pc No',lbl:'Device',ic:'🖥️'},
  {key:'Modality',lbl:'Modality',ic:'🔬'},{key:'Queue Name',lbl:'Queue',ic:'📋'},
  {key:'Shift',lbl:'Shift',ic:'🔄'}
];

const shiftState = {
  overnight:{on:false,key:"over night"},overnight12h:{on:false,key:"over night 12 h"},
  morning12h:{on:false,key:"morning 12 h"},night:{on:false,key:"night"},
  morning:{on:false,key:"morning"},overmshift:{on:false,key:"over shift (m)"},
  overnshift:{on:false,key:"over shift (n)"},oversonshift:{on:false,key:"over shift (on)"}
};

let rawRows=[],hdrs=[],sOpts={},sIdx={},tsIdx=-1,locColIdx=-1,todayStr='';
let locations=[],activeLoc='__all__';
let sel={},selD=new Set(),selWeeks=new Set();
let sortC=-1,sortDr=1,fcache=[],openK=null,locSearch={};
let autoRefreshTimer=null,_filtersRestored=false;

document.addEventListener('click',e=>{if(!e.target.closest('.fg'))closeAll();});

function toggleShift(id,btn){
  shiftState[id].on=!shiftState[id].on;
  btn.classList.toggle('on',shiftState[id].on);
  btn.querySelector('.dot').textContent=shiftState[id].on?'●':'○';
  applyAll();
}
function isRowAllowed(r){
  const ci=sIdx['Shift'];if(ci===undefined)return true;
  const sv=String(r[ci]||'').trim().toLowerCase();
  const anyOn=Object.values(shiftState).some(c=>c.on);
  if(!anyOn)return true;
  return Object.values(shiftState).some(c=>c.on&&sv===c.key);
}

// ── FETCH ─────────────────────────────────────────────
function loadData(){
  setSyncActive(true);
  const b=document.getElementById('refreshBtn');if(b)b.disabled=true;
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
  fetch(url).then(r=>r.text()).then(txt=>{
    const json=JSON.parse(txt.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
    onGvizData(json);
  }).catch(e=>{
    setSyncActive(false);if(b)b.disabled=false;
    showErr('Failed to load: '+e.message);
  });
}

function onGvizData(json){
  const b=document.getElementById('refreshBtn');if(b)b.disabled=false;
  setSyncActive(false);
  if(!json||!json.table){showErr('No data returned.');return;}
  const table=json.table,cols=table.cols||[],gRows=table.rows||[];
  hdrs=cols.map(c=>(c.label||c.id||'').trim());
  const hLower=hdrs.map(h=>h.toLowerCase());
  sIdx={};
  ["Shift","Unit","Qtc Name","Yubikey Email","Labeler Name","Pc No","Modality","Queue Name","Location"].forEach(name=>{
    const i=hLower.indexOf(name.toLowerCase());if(i>=0)sIdx[name]=i;
  });
  tsIdx=hLower.findIndex(h=>h==='timestamp');
  if(tsIdx<0)tsIdx=hLower.findIndex(h=>h==='created at');
  if(tsIdx<0)tsIdx=hLower.findIndex(h=>h==='date');
  if(tsIdx<0)tsIdx=hLower.findIndex(h=>h.includes('date'));
  locColIdx=hLower.findIndex(h=>h==='location');
  if(locColIdx<0)locColIdx=hLower.findIndex(h=>h==='unit');
  if(locColIdx<0)locColIdx=hLower.findIndex(h=>h==='site');

  rawRows=[];
  for(const gRow of gRows){
    if(!gRow||!gRow.c)continue;
    const cells=gRow.c;
    const row=hdrs.map((_,ci)=>{
      const cell=cells[ci];
      if(!cell||cell.v===null||cell.v===undefined)return'';
      if(cols[ci]&&cols[ci].type==='date'&&cell.v){
        const m=String(cell.v).match(/Date\((\d+),(\d+),(\d+)/);
        if(m)return`${m[1]}-${String(+m[2]+1).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
        return cell.f||String(cell.v);
      }
      if(cols[ci]&&cols[ci].type==='datetime'&&cell.v){
        const m=String(cell.v).match(/Date\((\d+),(\d+),(\d+),(\d+),(\d+),(\d+)/);
        if(m)return`${m[1]}-${String(+m[2]+1).padStart(2,'0')}-${String(m[3]).padStart(2,'0')} ${String(m[4]).padStart(2,'0')}:${String(m[5]).padStart(2,'0')}:${String(m[6]).padStart(2,'0')}`;
        return cell.f||String(cell.v);
      }
      return cell.f!==undefined&&cell.f!==null?cell.f:String(cell.v);
    });
    const sci=sIdx['Shift'];
    if(sci!==undefined){const sv=String(row[sci]||'').trim().toLowerCase();if(!ALL_SHIFTS.some(a=>sv===a))continue;}
    rawRows.push(row);
  }

  sOpts={};
  ["Shift","Unit","Qtc Name","Yubikey Email","Labeler Name","Pc No","Modality","Queue Name","Location"].forEach(name=>{
    const ci=sIdx[name];if(ci===undefined)return;
    const set=new Set();rawRows.forEach(r=>{const v=String(r[ci]||'').trim();if(v)set.add(v);});
    sOpts[name]=[...set].sort();
  });
  const dateSet=new Set();
  rawRows.forEach(r=>{const d=extractDate(r[tsIdx]);if(d)dateSet.add(d);});
  sOpts['_dates']=[...dateSet].sort().reverse();
  const locSet=new Set();
  if(locColIdx>=0)rawRows.forEach(r=>{const v=String(r[locColIdx]||'').trim();if(v)locSet.add(v);});
  locations=[...locSet].sort();

  const now=new Date();
  todayStr=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  document.getElementById('todayLabel').textContent=todayStr;
  document.getElementById('lastUpdated').textContent=_now();
  document.getElementById('totalBadge').textContent=rawRows.length+' rows';

  SC.forEach(s=>{if(!sel[s.key])sel[s.key]=new Set();});
  if(!_filtersRestored){restoreFilters();_filtersRestored=true;}
  buildStrip();buildTabs();applyAll();
  if(autoRefreshTimer)clearInterval(autoRefreshTimer);
  autoRefreshTimer=setInterval(loadData,REFRESH_INTERVAL*1000);
}

function extractDate(v){
  if(!v)return null;const s=String(v).trim();
  if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.substring(0,10);
  const m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(m)return m[3]+'-'+m[1].padStart(2,'0')+'-'+m[2].padStart(2,'0');
  return null;
}
function rDate(r){
  if(tsIdx<0)return'';const v=String(r[tsIdx]||'').trim();
  const iso=v.match(/^(\d{4}-\d{2}-\d{2})/);return iso?iso[1]:'';
}
function _now(){
  const n=new Date();
  return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0')+' '+String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
}
function setSyncActive(v){const b=document.getElementById('syncBar');if(b)b.classList.toggle('active',v);}

// ── WEEK / DATE ───────────────────────────────────────
function getMondayStr(d){
  if(!d||!d.match(/^\d{4}-\d{2}-\d{2}$/))return'';
  const dt=new Date(d+'T12:00:00');const day=dt.getDay();const diff=day===0?-6:1-day;
  const mon=new Date(dt);mon.setDate(dt.getDate()+diff);return mon.toISOString().substring(0,10);
}
function getWeekLabel(d){const m=getMondayStr(d);return m?'Week of Mon '+m:d;}

// ── FILTER STRIP ──────────────────────────────────────
function buildStrip(){
  const s=document.getElementById('fstrip');const dates=sOpts._dates||[];let h='';
  if(dates.length){
    window._weekList=[];const weekMap={};
    dates.forEach(d=>{const lbl=getWeekLabel(d);if(!weekMap[lbl]){weekMap[lbl]=[];window._weekList.push(lbl);}weekMap[lbl].push(d);});
    window._weekList.sort().reverse();window._weekMap=weekMap;
    const wCnt=selWeeks.size;
    h+=`<div class="fg" id="fg___week"><div class="fchip${wCnt?' has-sel':''}" id="fc___week" onclick="tgDrop('__week')">📅 Week${wCnt?` <span class="chk-cnt">${wCnt}</span>`:''} <span class="chk-arr">▾</span></div>
      <div class="dpanel" id="dp___week">${window._weekList.length>5?`<input class="dp-srch" placeholder="Search week…" oninput="rdropWeek()" id="ds___week"/>`:''}
        <div class="dp-list" id="dl___week"></div>
        <div class="dp-foot"><button onclick="clrWeeks();event.stopPropagation()">✕ Clear</button><button onclick="closeDr('__week');event.stopPropagation()">✓ Done</button></div>
      </div></div>`;
    const dCnt=selD.size;
    h+=`<div class="fg" id="fg___date"><div class="fchip${dCnt?' has-sel':''}" id="fc___date" onclick="tgDrop('__date')">📆 Date${dCnt?` <span class="chk-cnt">${dCnt}</span>`:''} <span class="chk-arr">▾</span></div>
      <div class="dpanel" id="dp___date"><input class="dp-srch" placeholder="Search date…" oninput="rdropDate()" id="ds___date"/>
        <div class="dp-list" id="dl___date"></div>
        <div class="dp-foot"><button onclick="clrDates();event.stopPropagation()">✕ Clear</button><button onclick="closeDr('__date');event.stopPropagation()">✓ Done</button></div>
      </div></div>`;

    objCard.innerHTML=`<div class="sec-hd"><span class="sec-t">🔢 Object Count — Total</span><span class="sec-m">${objRowCount} tasks</span></div>
      <div style="padding:18px 14px;display:flex;align-items:center;gap:16px">
        <div style="flex:1"><div style="font-size:.55rem;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px;font-weight:700">Total Objects</div>
          <div style="font-size:2rem;font-weight:800;color:var(--accent);font-family:var(--mono);letter-spacing:-1px">${totalObjects.toLocaleString()}</div>
          <div style="font-size:.58rem;color:var(--muted);margin-top:2px">Across ${objRowCount} submitted tasks</div></div>
        <div style="text-align:right"><div style="font-size:.55rem;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px;font-weight:700">Avg / Task</div>
          <div style="font-size:1.2rem;font-weight:700;color:var(--primary);font-family:var(--mono)">${(totalObjects/objRowCount).toFixed(1)}</div></div>
      </div>`;
    summaryWrap.appendChild(objCard);
  }
  if(summaryWrap.children.length)wrap.appendChild(summaryWrap);

  // ── TOP QTC & LABELER with Modality filter ─────────
  const qtcIdx=hdrs.findIndex(h=>h.toLowerCase()==='qtc name');
  const labIdx=hdrs.findIndex(h=>h.toLowerCase()==='labeler name');
  const qtcMap={},labMap={},qtcDetailMap={},labDetailMap={};
  rows.forEach(r=>{
    const mv=mIdx>=0?String(r[mIdx]||'').trim():'';const pv=passIdx>=0?String(r[passIdx]||'').trim():'';
    if(qtcIdx>=0){const qtc=String(r[qtcIdx]||'').trim();if(qtc){qtcMap[qtc]=(qtcMap[qtc]||0)+1;if(mv&&pv){if(!qtcDetailMap[qtc])qtcDetailMap[qtc]={};if(!qtcDetailMap[qtc][mv])qtcDetailMap[qtc][mv]={};qtcDetailMap[qtc][mv][pv]=(qtcDetailMap[qtc][mv][pv]||0)+1;}}}
    if(labIdx>=0){const lab=String(r[labIdx]||'').trim();if(lab){labMap[lab]=(labMap[lab]||0)+1;if(mv&&pv){if(!labDetailMap[lab])labDetailMap[lab]={};if(!labDetailMap[lab][mv])labDetailMap[lab][mv]={};labDetailMap[lab][mv][pv]=(labDetailMap[lab][mv][pv]||0)+1;}}}
  });

  // Build modality filter for person tables
  const personMods=['All',...allMods];

  function mkPersonTable(icon,title,nameLabel,dataMap,detailMap,tableId){
    const sorted=Object.entries(dataMap).sort((a,b)=>b[1]-a[1]);if(!sorted.length)return null;
    const sec=document.createElement('div');sec.className='sec';
    // Modality filter bar
    const filterBar=document.createElement('div');
    filterBar.className='sec-hd';filterBar.style.flexDirection='column';filterBar.style.alignItems='flex-start';filterBar.style.gap='8px';
    filterBar.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;width:100%">
      <span class="sec-t">${icon} ${title}</span>
      <span class="sec-m" id="meta_${tableId}">${sorted.length} ${nameLabel} · ${Object.values(dataMap).reduce((a,b)=>a+b,0)} total</span>
    </div>
    <div class="mod-filter-bar" style="padding:0;border:none;background:transparent;">
      <span class="mod-filter-label">Filter:</span>
      ${personMods.map(m=>`<button class="mod-chip${m==='All'?' mod-chip-all on':''}" data-mod="${esc(m)}" onclick="filterPersonTable('${tableId}','${esc(m)}')">${esc(m)}</button>`).join('')}
    </div>`;
    sec.appendChild(filterBar);
    const tableWrap=document.createElement('div');tableWrap.id='wrap_'+tableId;tableWrap.style.cssText='overflow-x:auto;max-height:360px;overflow-y:auto;';
    sec.appendChild(tableWrap);
    // Store data for re-render
    window['_ptData_'+tableId]={sorted,dataMap,detailMap,nameLabel,allMods,allPasses,modColor,mkGroupedThead,mkGroupedCells,mkGroupedFootCells};
    renderPersonTable(tableId,'All');
    return sec;
  }

  function renderPersonTable(tableId,activeMod){
    const d=window['_ptData_'+tableId];if(!d)return;
    const{sorted,dataMap,detailMap,nameLabel}=d;
    const wrap=document.getElementById('wrap_'+tableId);if(!wrap)return;
    // Filter rows by modality
    let filteredSorted=sorted;
    if(activeMod!=='All'){
      filteredSorted=sorted.map(([name,total])=>{
        const modTotal=Object.values((detailMap[name]||{})[activeMod]||{}).reduce((a,b)=>a+b,0);
        return[name,modTotal];
      }).filter(([,t])=>t>0).sort((a,b)=>b[1]-a[1]);
    }
    const grandTotal=filteredSorted.reduce((s,[,c])=>s+c,0);
    const max=filteredSorted.length?filteredSorted[0][1]:0;
    // Update meta
    const metaEl=document.getElementById('meta_'+tableId);
    if(metaEl)metaEl.textContent=`${filteredSorted.length} ${nameLabel} · ${grandTotal} total`;
    if(!filteredSorted.length){wrap.innerHTML='<div class="empty"><span>🔍</span>No data for this modality.</div>';return;}
    const bodyRows=filteredSorted.map(([name,total],i)=>{
      const pct=max?Math.round(total/max*100):0;
      const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':`<span style='color:var(--muted);font-family:var(--mono);font-size:.55rem'>#${i+1}</span>`;
      const subCells=activeMod==='All'?d.mkGroupedCells(detailMap[name]||{}):'';
      return`<tr style="border-bottom:1px solid var(--border-light)">
        <td style="padding:5px 10px;font-size:.62rem;color:var(--text);white-space:nowrap"><div style="display:flex;align-items:center;gap:5px"><span style="min-width:18px">${medal}</span>
          <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:130px">${esc(name)}</span></div></td>
        ${subCells}<td style="padding:5px 10px;text-align:right"><div style="display:flex;align-items:center;gap:5px;justify-content:flex-end">
          <div style="width:50px;height:3px;background:var(--border);border-radius:2px;overflow:hidden"><div style="width:${pct}%;height:100%;background:var(--accent);border-radius:2px"></div></div>
          <span style="font-size:.68rem;font-family:var(--mono);color:var(--accent);font-weight:700;min-width:24px;text-align:right">${total}</span></div></td></tr>`;}).join('');
    const thead=activeMod==='All'?d.mkGroupedThead(nameLabel):`<thead><tr><th style="background:var(--elevated);color:var(--text-soft);font-size:.55rem;padding:7px 10px;text-align:left;border-bottom:1.5px solid var(--border);font-weight:700">${nameLabel}</th><th style="background:var(--elevated);color:var(--text-soft);font-size:.55rem;padding:7px 10px;text-align:right;border-bottom:1.5px solid var(--border);font-weight:700">Submits</th></tr></thead>`;
    const footCells=activeMod==='All'?d.mkGroupedFootCells(Object.values(detailMap)):`<td style="padding:5px 10px;text-align:right;font-size:.68rem;font-weight:800;color:var(--accent);font-family:var(--mono)">${grandTotal}</td>`;
    wrap.innerHTML=`<table style="width:100%;border-collapse:collapse;font-size:.68rem">${thead}<tbody>${bodyRows}</tbody>
      <tfoot><tr style="border-top:2px solid var(--border)"><td style="padding:5px 10px;font-size:.65rem;font-weight:700;color:var(--text-soft)">Total</td>${footCells}</tr></tfoot></table>`;
  }

  window.filterPersonTable=function(tableId,mod){
    // Update chip styles
    document.querySelectorAll(`[data-table="${tableId}"] .mod-chip,[onclick*="${tableId}"]`).forEach(b=>{
      if(b.dataset.mod!==undefined)b.classList.toggle('on',b.dataset.mod===mod);
    });
    // Find all chips in this section and update
    const sec=document.getElementById('wrap_'+tableId);
    if(sec){
      const allChips=sec.closest('.sec').querySelectorAll('.mod-chip');
      allChips.forEach(b=>b.classList.toggle('on',b.dataset.mod===mod));
    }
    renderPersonTable(tableId,mod);
  };

  const qtcSec=mkPersonTable('🏷️','Top QTC — Most Submits','QTCs',qtcMap,qtcDetailMap,'qtc_'+sid(locKey));
  const labSec=mkPersonTable('👤','Top Labeler — Most Submits','Labelers',labMap,labDetailMap,'lab_'+sid(locKey));
  if(qtcSec)wrap.appendChild(qtcSec);
  if(labSec)wrap.appendChild(labSec);
}

function renderCards(locKey,rows){
  const g=document.getElementById('cgrid_'+sid(locKey));const metaEl=document.getElementById('devMeta_'+sid(locKey));
  const pi=sIdx['Pc No'],qi=hdrs.findIndex(h=>h.toLowerCase()==='queue name');
  const ei=hdrs.findIndex(h=>h.toLowerCase()==='yubikey email'),ni=hdrs.findIndex(h=>h.toLowerCase()==='labeler name');
  if(!g)return;
  if(pi===undefined){g.innerHTML='<div class="empty"><span>🖥️</span>"Pc No" column not found.</div>';return;}
  const map={};
  rows.forEach(r=>{
    const pc=String(r[pi]||'').trim()||'(unknown)';const q=qi>=0?String(r[qi]||''):'—';
    const em=ei>=0?String(r[ei]||''):'';const nm=ni>=0?String(r[ni]||''):'';
    if(!map[pc])map[pc]={pc,em,nm,total:0,queues:{}};map[pc].total++;map[pc].queues[q]=(map[pc].queues[q]||0)+1;
  });
  const sorted=Object.values(map).sort((a,b)=>{const na=parseFloat(a.pc),nb=parseFloat(b.pc);if(!isNaN(na)&&!isNaN(nb))return na-nb;return String(a.pc).localeCompare(String(b.pc),undefined,{numeric:true});});
  if(metaEl)metaEl.textContent=`${sorted.length} device${sorted.length!==1?'s':''}`;
  if(!sorted.length){g.innerHTML='<div class="empty"><span>🌙</span>No data.</div>';return;}
  const pcs=sel['Pc No']||new Set();
  g.innerHTML=sorted.map((d,i)=>{
    const tags=Object.entries(d.queues).sort((a,b)=>b[1]-a[1]).map(([q,c])=>`<span class="qtag">${esc(q)}: ${c}</span>`).join('');
    return`<div class="dcard${pcs.has(d.pc)?' sel':''}" style="animation-delay:${Math.min(i*.03,.4)}s" onclick="tgVal('Pc No','${esc(d.pc)}')">
      <div class="dc-top"><span class="dc-pc">C-${esc(d.pc)}</span><span class="dc-cnt">${d.total}</span></div>
      <div class="dc-meta"><span class="dc-mi">👤</span><span class="dc-mt">${esc(d.nm)||'—'}</span></div>
      <div class="dc-meta"><span class="dc-mi">✉</span><span class="dc-mt">${esc(d.em)||'—'}</span></div>
      <div class="dc-qs">${tags||'<span class="qtag">—</span>'}</div>
    </div>`;
  }).join('');
}

function locSrch(locKey,val){if(!locSearch)locSearch={};locSearch[locKey]=val;renderLocTable(locKey,getLocRows(locKey),0);}
function getLocRows(locKey){if(locKey==='all'||locColIdx<0)return fcache;return fcache.filter(r=>String(r[locColIdx]||'').trim()===locKey);}

function renderLocTable(locKey,baseRows,pg){
  const tblEl=document.getElementById('tbl_'+sid(locKey)),pgEl=document.getElementById('pg_'+sid(locKey));
  const rcEl=document.getElementById('rc_'+sid(locKey)),metaEl=document.getElementById('tblMeta_'+sid(locKey));
  if(!tblEl)return;
  const q=(locSearch[locKey]||'').toLowerCase().trim();
  let rows=q?baseRows.filter(r=>r.some(c=>String(c??'').toLowerCase().includes(q))):baseRows;
  if(sortC>=0)rows=[...rows].sort((a,b)=>String(a[sortC]??'').localeCompare(String(b[sortC]??''),undefined,{numeric:true})*sortDr);
  if(rcEl)rcEl.textContent=`${rows.length} row${rows.length!==1?'s':''}`;
  if(metaEl)metaEl.textContent=`${rows.length} rows shown`;
  const tp=Math.max(1,Math.ceil(rows.length/PGSZ));const cp=Math.min(pg,tp-1);
  const st=cp*PGSZ,en=Math.min(st+PGSZ,rows.length),pr=rows.slice(st,en);
  const hl=hdrs.map(h=>h.toLowerCase());
  const linkIdx=hl.findIndex(h=>h==='task link'||h==='link');
  const objIdx=hl.findIndex(h=>h==='object count');
  const hiddenCols=new Set(linkIdx>=0&&objIdx>=0?[objIdx]:[]);
  const thArr=[];
  hdrs.forEach((h,i)=>{
    if(hiddenCols.has(i))return;if(!h||h==='—')return;
    const cls=i===sortC?(sortDr===1?'sa':'sd'):'';
    thArr.push(`<th class="${cls}" data-ci="${i}">${esc(h)}</th>`);
    if(i===linkIdx&&objIdx>=0)thArr.push(`<th style="background:var(--elevated);color:var(--text-soft);text-transform:uppercase;font-size:.55rem;padding:7px 10px;border-bottom:1.5px solid var(--border);font-weight:700;white-space:nowrap">Objects</th>`);
  });
  const trs=pr.map(r=>{
    const cells=[];
    r.forEach((c,ci)=>{
      if(hiddenCols.has(ci))return;if(!hdrs[ci]||hdrs[ci]==='—')return;
      const h=hl[ci]||'';let v=c===null||c===undefined?'':String(c);
      if((h==='task link'||h==='link')&&v.startsWith('http'))v=`<a href="${esc(v)}" target="_blank" rel="noopener">🔗</a>`;
      else if(h==='queue name'&&v)v=`<span class="tdq">${esc(v)}</span>`;
      else if(h==='shift'&&v)v=`<span class="tds">${esc(v)}</span>`;
      else v=esc(v);
      cells.push(`<td title="${esc(String(c??''))}">${v}</td>`);
      if(ci===linkIdx&&objIdx>=0){const objVal=String(r[objIdx]??'').trim();const num=parseFloat(objVal);const disp=!isNaN(num)?`<span style="font-family:var(--mono);font-weight:700;color:var(--accent);font-size:.68rem">${num.toLocaleString()}</span>`:`<span style="color:var(--muted);font-size:.65rem">—</span>`;cells.push(`<td style="white-space:nowrap;text-align:right">${disp}</td>`);}
    });
    return`<tr>${cells.join('')}</tr>`;
  }).join('')||`<tr><td colspan="${thArr.length}" style="text-align:center;padding:22px;color:var(--muted)">No rows match.</td></tr>`;
  window['baseRows_'+sid(locKey)]=baseRows;
  tblEl.innerHTML=`<table><thead><tr>${thArr.join('')}</tr></thead><tbody>${trs}</tbody></table>`;
  tblEl.querySelectorAll('thead th[data-ci]').forEach(th=>{const ci=parseInt(th.dataset.ci);th.onclick=()=>srtBy(ci,locKey,baseRows);});
  if(!pgEl)return;
  if(tp<=1){pgEl.style.display='none';return;}
  pgEl.style.display='flex';
  let pgH=`<button class="pg-btn" onclick="renderLocTable('${locKey}',window['baseRows_${sid(locKey)}'],${cp-1})" ${cp===0?'disabled':''}>‹</button>`;
  const lo=Math.max(0,cp-2),hi=Math.min(tp-1,cp+2);
  if(lo>0)pgH+=`<button class="pg-btn" onclick="renderLocTable('${locKey}',window['baseRows_${sid(locKey)}'],0)">1</button>${lo>1?'<span style="color:var(--muted);padding:0 2px;font-size:.6rem">…</span>':''}`;
  for(let p=lo;p<=hi;p++)pgH+=`<button class="pg-btn${p===cp?' act':''}" onclick="renderLocTable('${locKey}',window['baseRows_${sid(locKey)}'],${p})">${p+1}</button>`;
  if(hi<tp-1)pgH+=`${hi<tp-2?'<span style="color:var(--muted);padding:0 2px;font-size:.6rem">…</span>':''}<button class="pg-btn" onclick="renderLocTable('${locKey}',window['baseRows_${sid(locKey)}'],${tp-1})">${tp}</button>`;
  pgH+=`<button class="pg-btn" onclick="renderLocTable('${locKey}',window['baseRows_${sid(locKey)}'],${cp+1})" ${cp===tp-1?'disabled':''}>›</button>`;
  pgH+=`<span class="pg-inf">${st+1}–${en} / ${rows.length}</span>`;
  pgEl.innerHTML=pgH;
}
function srtBy(ci,locKey,baseRows){if(sortC===ci)sortDr*=-1;else{sortC=ci;sortDr=1;}renderLocTable(locKey,baseRows,0);}

// ── TOAST & ERROR ─────────────────────────────────────
let _toastTimer=null;
function showToast(msg){
  const ex=document.querySelector('.toast');if(ex)ex.remove();
  if(_toastTimer)clearTimeout(_toastTimer);
  const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);
  _toastTimer=setTimeout(()=>{t.style.opacity='0';t.style.transform='translateY(10px)';t.style.transition='all .3s';setTimeout(()=>t.remove(),300);},3000);
}
function showErr(msg){
  document.getElementById('mainContent').innerHTML=`<div class="errbox">⚠️ ${esc(msg)}</div>`;
  document.getElementById('fstrip').innerHTML=`<div style="padding:10px 20px;font-size:.68rem;color:var(--danger)">${esc(msg)}</div>`;
  document.getElementById('locTabs').innerHTML='';
}
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

// ── INIT ──────────────────────────────────────────────
window.addEventListener('load',()=>{
  const savedTheme=localStorage.getItem('meeg_theme')||'light';
  document.documentElement.setAttribute('data-theme',savedTheme);
  document.getElementById('dmIcon').textContent=savedTheme==='dark'?'☀️':'🌙';
  document.getElementById('dmLabel').textContent=savedTheme==='dark'?'Light':'Dark';
  hideSplash();
  loadData();
});
</script>
